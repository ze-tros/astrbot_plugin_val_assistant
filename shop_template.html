<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>每日商店</title>
<style>
  :root {
    --val-red: #ff4655;
    --val-dark: #0f1923;
    --val-bg: #1a242d;
    --val-card: #222e3a;
    --val-text: #ece8e1;
    --val-muted: #8b9799;
    --val-gold: #ffd700;
    --card-shadow: rgba(255, 70, 85, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--val-dark);
    background-image:
      radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--val-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 顶部横幅 ── */
  .banner {
    background: linear-gradient(135deg, #ff4655 0%, #bd3944 40%, #0f1923 100%);
    padding: 56px 48px 40px;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }
  .banner h1 {
    font-size: 42px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
    text-align: center;
    position: relative;
  }
  .banner .accent-line {
    width: 80px;
    height: 4px;
    background: var(--val-gold);
    margin: 16px auto 0;
    border-radius: 2px;
    position: relative;
  }

  /* ── 分区标题 ── */
  .store-section {
    margin-bottom: 36px;
  }
  .store-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
  }
  .store-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--val-red);
    padding-left: 16px;
    border-left: 5px solid var(--val-red);
    margin: 0 0 24px 0;
    letter-spacing: 1px;
  }

  /* ── 商品列表 ── */
  .items-container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 32px 40px 48px;
  }

  /* ── 商品卡片 ── */
  .item-card {
    background: var(--val-card);
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      5px 5px 0 var(--card-shadow),
      0 24px 40px rgba(0, 0, 0, 0.3);
  }

  .item-image-wrap {
    position: relative;
    width: 100%;
  }
  .item-image-wrap::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30%;
    background: linear-gradient(transparent, rgba(0,0,0,0.3));
    pointer-events: none;
    z-index: 1;
  }
  .item-overlay {
    z-index: 2;
  }
  .item-bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .item-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    max-height: 65%;
    max-width: 70%;
  }

  .item-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  .item-name {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .item-price {
    font-size: 17px;
    font-weight: 700;
    color: var(--val-gold);
    letter-spacing: 1px;
  }

  /* ── 空状态 ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--val-muted);
    font-size: 22px;
  }

  /* ── 底部 ── */
  .footer {
    text-align: center;
    padding: 32px 40px;
    color: var(--val-muted);
    font-size: 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }
  .footer .brand {
    color: var(--val-red);
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="banner">
    <h1>{{ title_text }}</h1>
    <div class="accent-line"></div>
  </div>

  <div class="items-container">
    {% if goods_list %}
      {% for goods in goods_list %}
      <div class="item-card">
        <div class="item-image-wrap">
          <img class="item-bg" src="data:image/jpeg;base64,{{ goods.bg_img }}" alt="" />
          <img class="item-overlay" src="data:image/jpeg;base64,{{ goods.goods_img }}" alt="" />
        </div>
        <div class="item-info">
          <span class="item-name">{{ goods.goods_name }}</span>
          <span class="item-price">{{ goods.rmb_price }}</span>
        </div>
      </div>
      {% endfor %}
    {% else %}
      <div class="empty-state">今日商店暂无数据</div>
    {% endif %}
  </div>

  <div class="footer">
    Generated by <span class="brand">AstrBot</span> Valorant Assistant
  </div>
</body>
</html>
