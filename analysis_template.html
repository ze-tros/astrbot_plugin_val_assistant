<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>无畏契约战绩分析</title>
<style>
  :root {
    --val-red: #ff4655;
    --val-dark: #0f1923;
    --val-bg: #1a242d;
    --val-card: #222e3a;
    --val-text: #ece8e1;
    --val-muted: #8b9799;
    --val-gold: #ffd700;
    --val-green: #3eaf7c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--val-dark);
    background-image:
      radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 22px 22px;
    color: var(--val-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 2;
    font-size: 20px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 顶部横幅 ── */
  .banner {
    background: linear-gradient(135deg, #ff4655 0%, #bd3944 40%, #0f1923 100%);
    padding: 48px 40px 32px;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: "";
    position: absolute;
    top: -30px; right: -30px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .banner h1 {
    font-size: 38px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
    position: relative;
  }
  .banner .subtitle {
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
    position: relative;
  }

  /* ── 主体 ── */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 40px 48px;
  }

  /* ── 标题 ── */
  h1 {
    font-size: 34px;
    color: var(--val-red);
    border-left: 5px solid var(--val-red);
    padding-left: 16px;
    margin: 36px 0 16px;
  }
  h1:first-of-type { margin-top: 0; }

  h2 {
    font-size: 28px;
    color: #fff;
    margin: 32px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid rgba(255, 70, 85, 0.3);
  }

  h3 {
    font-size: 22px;
    color: var(--val-gold);
    margin: 24px 0 8px;
  }

  p { margin: 10px 0; }

  strong {
    color: var(--val-red);
    font-weight: 700;
  }

  /* ── 表格 ── */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 18px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #2a3a4a;
  }
  thead {
    background: linear-gradient(135deg, #ff4655, #bd3944);
  }
  thead th {
    color: #fff;
    font-weight: 700;
    padding: 14px 10px;
    text-align: center;
    font-size: 17px;
    letter-spacing: 1px;
  }
  tbody td {
    padding: 12px 10px;
    text-align: center;
    border-bottom: 1px solid #2a3a4a;
    background: var(--val-card);
  }
  tbody tr:nth-child(even) td {
    background: rgba(255, 70, 85, 0.05);
  }

  /* ── 列表 ── */
  ul, ol {
    padding-left: 24px;
    margin: 10px 0;
  }
  li { margin: 4px 0; }
  li::marker { color: var(--val-red); }

  /* ── 引用 ── */
  blockquote {
    border-left: 4px solid var(--val-red);
    background: var(--val-card);
    padding: 12px 20px;
    margin: 16px 0;
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: var(--val-muted);
  }

  /* ── 代码 ── */
  code {
    background: rgba(255, 70, 85, 0.15);
    color: var(--val-red);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: "Consolas", "Monaco", monospace;
  }
  pre {
    background: #0d1117;
    border: 1px solid #2a3a4a;
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 12px 0;
  }
  pre code {
    background: transparent;
    color: var(--val-text);
    padding: 0;
  }

  /* ── 分割线 ── */
  hr {
    border: none;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--val-red), transparent);
    margin: 32px 0;
  }

  /* ── 评分徽章 ── */
  .score-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--val-red), #bd3944);
    color: #fff;
    font-size: 48px;
    font-weight: 800;
    padding: 16px 36px;
    border-radius: 16px;
    box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.3);
    letter-spacing: 2px;
  }

  /* ── 底部 ── */
  .footer {
    text-align: center;
    padding: 24px 40px;
    color: var(--val-muted);
    font-size: 13px;
    border-top: 1px solid #2a3a4a;
  }
  .footer strong { color: var(--val-red); }
</style>
</head>
<body>
  <div class="banner">
    <h1>&#x1F3AF; 无畏契约战绩分析</h1>
    <div class="subtitle">Valorant Performance Report</div>
  </div>

  <div class="container">
    {{ content }}
  </div>

  <div class="footer">
    Generated by <strong>AstrBot</strong> Valorant Analysis Plugin
  </div>
</body>
</html>
